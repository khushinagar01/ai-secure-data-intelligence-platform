<!DOCTYPE html>
<html>
<head>
    <title>Smart PDF Assistant</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        h3 {
            color: #34495e;
            margin-top: 20px;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* Hover effect on input */
        input:hover {
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border: none;
            background: #2c3e50;
            color: white;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Hover effect on button */
        button:hover {
            background: #34495e;
            font-weight: bold;
            transform: scale(1.03);
        }

        #summary {
    margin-top: 10px;
    padding: 12px;
    background: #ecf0f1;
    border-radius: 5px;
    min-height: 60px;   /* ✅ important */
    max-height: 150px;
    overflow-y: auto;
    font-size: 14px;
}

        #result {
            margin-top: 10px;
            font-weight: bold;
        }

        #fileName {
            margin-top: 5px;
            font-size: 13px;
            color: #27ae60;
        }

        /* subtle hover on summary */
        #summary:hover {
            background: #e1e5e7;
        }

        #analysis {
          margin-top: 10px;
          padding: 10px;
          background: #fff3f3;
          border-left: 4px solid red;
          border-radius: 5px;
          font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
<h2>Smart PDF Assistant</h2>

<input type="file" id="pdfFile"  accept=".pdf,.txt,.log">


<p id="fileName"></p>

<button type="button" onclick="uploadPDF()">Upload PDF</button>

<h3>Summary:</h3>
<p id="summary">Summary will appear here...</p>
<h3>🔐 Security Analysis</h3>
<div id="analysis"></div>

<h3>Search:</h3>
<input type="text" id="searchText" placeholder="Enter keyword">
<button type="button" onclick="searchPDF()">Search</button>
<p id="result"></p>
</div>
<script>
let selectedFile = null;
let fullText = "";

// store file
document.getElementById("pdfFile").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];

    if (selectedFile) {
        document.getElementById("fileName").innerText =
            "Selected: " + selectedFile.name;
    }
});

async function uploadPDF() {
    const fileInput = document.getElementById("pdfFile");

    if (fileInput.files.length === 0) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("pdf", fileInput.files[0]);

    try {
        const response = await fetch("http://127.0.0.1:5000/upload", {
            method: "POST",
            body: formData
        });

        // ✅ THIS LINE MUST BE HERE
        const data = await response.json();
        fullText = data.text || "";
console.log("TEXT:", fullText);

        console.log("DATA:", data); // debug

        // ✅ Summary
        document.getElementById("summary").innerText =
    fullText
        ? fullText.replace(/\n+/g, " ").substring(0, 300)
        : "No content extracted";

        // ✅ Security Analysis
        let analysisHTML = "<b>Risk Level:</b> " + (data.risk_level || "low") + "<br><br>";

        if (data.findings && data.findings.length > 0) {
            data.findings.forEach(f => {
                analysisHTML += "⚠ " + f.type + " → " + f.risk + "<br>";
            });
        } else {
            analysisHTML += "No risks found";
        }

        document.getElementById("analysis").innerHTML = analysisHTML;

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

function searchPDF() {
    const word = document.getElementById("searchText").value;

    if (!fullText) {
        alert("Upload PDF first");
        return;
    }

    if (fullText.toLowerCase().includes(word.toLowerCase())) {
        document.getElementById("result").innerText = "✅ Found";
    } else {
        document.getElementById("result").innerText = "❌ Not Found";
    }
}
</script>

</body>
</html>
